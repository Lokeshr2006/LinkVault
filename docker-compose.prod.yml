version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: linkvault-db-prod
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  backend:
    build: ./linkvault-backend
    container_name: linkvault-backend-prod
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      PORT: 5000
      CLIENT_URL: ${CLIENT_URL}
      BASE_URL: ${BASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npx prisma db push && npm start"
    restart: always

  frontend:
    build: ./linkvault-frontend
    container_name: linkvault-frontend-prod
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data_prod: